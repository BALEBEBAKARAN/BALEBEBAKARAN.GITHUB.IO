<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Minimalis</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f8f9fa;
            color:#333;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:20px;
        }

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 0;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav a{
            text-decoration:none;
            color:#333;
            margin-left:20px;
        }

        .hero{
            min-height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        .hero p{
            max-width:600px;
            margin-bottom:25px;
            color:#666;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:#111;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.3s;
        }

        .btn:hover{
            opacity:0.85;
        }

        footer{
            text-align:center;
            padding:30px 0;
            color:#777;
            font-size:14px;
        }

        @media(max-width:768px){
            .hero h1{
                font-size:2rem;
            }

            nav{
                display:none;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <header>
            <div class="logo">Brand</div>

            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <h1>Solusi Digital Sederhana</h1>
            <p>
                Bangun bisnis Anda dengan landing page modern,
                cepat, dan responsif untuk meningkatkan konversi.
            </p>

            <a href="#" class="btn">Mulai Sekarang</a>
        </section>

        <footer>
            © 2026 Brand. All Rights Reserved.
        </footer>

    </div>

</body>
</html>
